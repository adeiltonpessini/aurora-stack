version: "3.7"
services:

## --------------------------- AURORA WEB --------------------------- ##
##
## App Next.js (standalone) que serve:
##   • stack.aurora-mcp.com   → landing institucional + catalogo
##   • setup.aurora-mcp.com   → mesmo container, rota /setup.sh serve
##                              o bash bootstrap (curl -sSL setup... | bash)
##
## Roda na MESMA VPS do BarberAI, reaproveitando a infra existente
## (Traefik + Cloudflare Tunnel), MAS em rede ISOLADA (AuroraNet) — ver
## "ISOLAMENTO DE REDE" abaixo. A imagem eh publicada pelo GitHub Actions
## em GHCR; o Portainer faz pull via PAT (mesmo do BarberAI).
##
## ───────────────────────── ISOLAMENTO DE REDE ─────────────────────────
## SEGURANCA (auditoria Nora 2026-05-28): a landing NAO fica mais na
## BarberaiNet. Numa rede compartilhada, se a landing fosse comprometida
## (RCE no Next), o atacante teria visibilidade L3 de Postgres, Evolution
## Go e do app BarberAI — movimento lateral. Agora a landing vive SOZINHA
## na AuroraNet.
##
## TRADE-OFF: o Traefik (roteador unico) vive na BarberaiNet. Pra ele
## conseguir rotear pra um container, precisa COMPARTILHAR uma rede com
## ele. Por isso o Traefik tambem precisa ser anexado a AuroraNet (passo
## de host, feito UMA vez pelo Davi — ver DEPLOY-WEB.md secao "Isolar a
## landing"). Resultado: Traefik fica nas DUAS redes (rota a landing),
## mas a landing NAO ve Postgres/Evolution/BarberAI. Isolamento real.
## ───────────────────────────────────────────────────────────────────────

  aurora_web:
    ## ── IMAGEM ──────────────────────────────────────────────────────
    ## ESTADO ATUAL: bootstrap com :latest (1o deploy). Funciona direto,
    ## sem precisar de digest. A tag :latest segue a branch main.
    ##
    ## DEPOIS QUE ESTIVER NO AR: pine por digest (sha256) pra travar a
    ## versao auditada e ficar imune a sobrescrita de tag (supply-chain).
    ## Passo-a-passo:
    ##   1. No servidor (tem Docker + acesso GHCR):
    ##        docker pull ghcr.io/adeiltonpessini/aurora-web:latest
    ##        docker inspect --format='{{index .RepoDigests 0}}' \
    ##          ghcr.io/adeiltonpessini/aurora-web:latest
    ##      → copia o ghcr.io/...@sha256:abc123...
    ##   2. Comenta a linha :latest abaixo e descomenta a do digest,
    ##      colando o sha256 real.
    ##   3. Redeploy. A partir dai, atualizar = trocar o digest de proposito.
    ## (Detalhes na secao 7 do DEPLOY-WEB.md.)
    image: ghcr.io/adeiltonpessini/aurora-web:latest
    # image: ghcr.io/adeiltonpessini/aurora-web@sha256:COLE_O_DIGEST_REAL_AQUI

    networks:
      - AuroraNet ## REDE ISOLADA — nao enxerga Postgres/Evolution/BarberAI

    environment:
      - NODE_ENV=production
      - PORT=4000
      - HOSTNAME=0.0.0.0

    ## ─── Blindagem do container (defesa em profundidade) ──────────────
    ## Reduz o blast radius caso a landing seja comprometida. A landing eh
    ## 100% estatica (so serve HTML + setup.sh), nao escreve em disco nem
    ## precisa de privilegio nenhum em runtime.
    ##
    ## NOTA SWARM: `docker stack deploy` (Swarm) IGNORA `security_opt`
    ## (no-new-privileges) — so funciona em `docker run`/compose single-host.
    ## Por isso foi removido daqui (estava sendo ignorado com warning).
    ## A protecao equivalente vem de `cap_drop: ALL` (remove CAP_SETUID/
    ## CAP_SETGID → nao da pra escalar privilegio via binario setuid) +
    ## user non-root (uid 1001 no Dockerfile). read_only/tmpfs/cap_drop
    ## SAO suportados no Swarm.
    read_only: true            ## rootfs imutavel — atacante nao persiste
    tmpfs:
      - /tmp                   ## unico path gravavel (Next usa pra cache efemero)
    cap_drop:
      - ALL                    ## zero capabilities Linux (cobre o no-new-privileges)

    ## ─── Healthcheck ──────────────────────────────────────────────────
    ## Usa `node` (sempre presente na node:20-slim) em vez de curl/wget
    ## (que nao estao instalados). GET na raiz; 2xx/3xx = saudavel.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:4000/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      ## ─── Limites de recurso ─────────────────────────────────────────
      ## Impede que a landing (ou um eventual leak/abuso) consuma a VPS
      ## inteira e derrube BarberAI/Postgres. Landing estatica eh leve;
      ## 256M/0.5cpu sobra. Reservation garante minimo pro scheduler.
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
      labels:
        - traefik.enable=true

        ## ───────────────────────────────────────────────────────────
        ## Cloudflare Tunnel na frente do Traefik (mesmo setup BarberAI).
        ## Traefik termina HTTPS interno (self-signed). Redirect 80→443
        ## eh feito pela Cloudflare ("Always Use HTTPS"). Por isso:
        ##   - tls=true (sem certresolver Let's Encrypt)
        ##   - sem router HTTP + redirectscheme
        ##
        ## ⚠️ Label de rede OBRIGATORIA quando o Traefik esta em MAIS DE
        ## UMA rede (BarberaiNet + AuroraNet) — sem ela o Traefik tenta
        ## rotear pela rede errada e da 502.
        ##
        ## ⚠️ NOME DO LABEL: em Traefik v3.2.2+ o `traefik.docker.network`
        ## foi DEPRECADO em favor de `traefik.swarm.network` (provider
        ## Swarm). Esta VPS roda Traefik v3.5.3 → tem que ser o `.swarm.`.
        ## Usar o `.docker.` aqui faz o Traefik IGNORAR e dar 502.
        ## (doc: traefik migrate/v3 — Swarm Provider Label Updates)
        ## ───────────────────────────────────────────────────────────
        - traefik.swarm.network=AuroraNet

        ## ── Router: landing (stack.) + setup (setup.) ──────────────
        ## Os dois hostnames apontam pro MESMO container. O Next.js
        ## serve a landing em / e o setup.sh em /setup.sh. Pra que
        ## `curl -sSL setup.aurora-mcp.com` funcione SEM o path
        ## /setup.sh, adicionamos um middleware de rewrite que mapeia
        ## a raiz de setup.aurora-mcp.com → /setup.sh (abaixo).
        - traefik.http.routers.aurora-web.rule=Host(`stack.aurora-mcp.com`) || Host(`setup.aurora-mcp.com`)
        - traefik.http.routers.aurora-web.entrypoints=websecure
        - traefik.http.routers.aurora-web.tls=true
        - traefik.http.routers.aurora-web.service=aurora-web

        ## ── Router dedicado pro setup.aurora-mcp.com na raiz ────────
        ## `curl -sSL setup.aurora-mcp.com` bate em GET / do host setup.
        ## Esse router (mais especifico, prioridade maior) reescreve a
        ## raiz pra /setup.sh. Assim o one-liner do README funciona sem
        ## o usuario digitar o path do arquivo.
        - traefik.http.routers.aurora-setup.rule=Host(`setup.aurora-mcp.com`) && Path(`/`)
        - traefik.http.routers.aurora-setup.entrypoints=websecure
        - traefik.http.routers.aurora-setup.tls=true
        - traefik.http.routers.aurora-setup.service=aurora-web
        - traefik.http.routers.aurora-setup.priority=100
        - traefik.http.routers.aurora-setup.middlewares=aurora-setup-rewrite
        - traefik.http.middlewares.aurora-setup-rewrite.replacepath.path=/setup.sh

        ## ── Service ─────────────────────────────────────────────────
        - traefik.http.services.aurora-web.loadbalancer.server.port=4000
        - traefik.http.services.aurora-web.loadbalancer.passHostHeader=true

networks:
  ## Rede isolada da landing. `external: true` → tem que ser criada UMA
  ## vez no host antes do 1o deploy (e o Traefik anexado a ela):
  ##   docker network create -d overlay --attachable AuroraNet
  ## Ver DEPLOY-WEB.md secao "Isolar a landing" pro passo-a-passo.
  AuroraNet:
    external: true
    name: AuroraNet
